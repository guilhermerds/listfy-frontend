services:
  frontend: # Mudei de 'server' para 'frontend' para ficar mais claro
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      # Passamos as variáveis aqui para o Dockerfile usar na hora do build
      args:
        VITE_SERVER_URL: "${VITE_SERVER_URL}"
    container_name: listfy-frontend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL}
      - VITE_FRONTEND_URL=${VITE_FRONTEND_URL}